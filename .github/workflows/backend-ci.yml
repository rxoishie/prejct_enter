          echo $! > ../backend-prod-server.pid

      - name: Wait for health and readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/health > /dev/null && curl -fsS http://localhost:4000/ready > /dev/null; then
