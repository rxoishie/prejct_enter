name: Backend CI

on:
  push:
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartirri
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d smartirri"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 4000
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartirri
      JWT_ACCESS_SECRET: ci-access-secret-please-change-in-prod
      JWT_REFRESH_SECRET: ci-refresh-secret-please-change-in-prod
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      DEVICE_SHARED_KEY: ci-device-key
      CORS_ORIGIN: http://localhost:5500
      TRUST_PROXY: true
      AUTH_LOGIN_MAX_FAILED_ATTEMPTS: 3
      AUTH_LOGIN_LOCKOUT_SECONDS: 120
      AUTH_LOGIN_BACKOFF_BASE_SECONDS: 0
      AUTH_LOGIN_BACKOFF_MAX_SECONDS: 30
      AUTH_LOGIN_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_LOGIN_RATE_LIMIT_MAX: 200
      AUTH_REFRESH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_REFRESH_RATE_LIMIT_MAX: 200
      BASE_URL: http://localhost:4000/api/v1
      SMOKE_USERNAME: Aishatou
      SMOKE_PASSWORD: password123

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Seed database
        run: npm run seed

      - name: Start backend server
        run: |
          npm start > ../backend-server.log 2>&1 &
          echo $! > ../backend-server.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/health > /dev/null; then
              echo "Backend is healthy"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:4000/health > /dev/null

      - name: Wait for readiness endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/ready > /dev/null; then
              echo "Backend is ready"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:4000/ready > /dev/null

      - name: Run smoke test
        env:
          DEVICE_SHARED_KEY: ci-device-key
        run: npm run smoke

      - name: Run API integration tests
        run: npm run test:api

      - name: Run rate limit integration tests
        run: npm run test:rate-limit

      - name: Print backend logs on failure
        if: failure()
        run: |
          echo "--- backend-server.log ---"
          cat ../backend-server.log || true

      - name: Stop backend server
        if: always()
        run: |
          if [ -f ../backend-server.pid ]; then
            kill "$(cat ../backend-server.pid)" || true
          fi

  ops-scripts-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/db-backup.sh scripts/db-restore.sh

      - name: backup script fails when DATABASE_URL is missing
        run: |
          set +e
          output="$(env -u DATABASE_URL bash scripts/db-backup.sh 2>&1)"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected db-backup.sh to fail when DATABASE_URL is missing"
            exit 1
          fi

          echo "$output" | grep -q "DATABASE_URL is not set"

      - name: restore script fails when DATABASE_URL is missing
        run: |
          set +e
          output="$(env -u DATABASE_URL bash scripts/db-restore.sh 2>&1)"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected db-restore.sh to fail when DATABASE_URL is missing"
            exit 1
          fi

          echo "$output" | grep -q "DATABASE_URL is not set"

      - name: restore script fails when backup file is missing
        run: |
          set +e
          output="$(DATABASE_URL=postgresql://user:pass@localhost:5432/db bash scripts/db-restore.sh 2>&1)"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected db-restore.sh to fail when backup file input is missing"
            exit 1
          fi

          echo "$output" | grep -q "Usage:"

      - name: backup script succeeds in dry run mode
        run: |
          rm -rf .ci-backups
          DATABASE_URL=postgresql://user:pass@localhost:5432/db \
          DRY_RUN=true \
          BACKUP_DIR=.ci-backups \
          BACKUP_PREFIX=ci \
          bash scripts/db-backup.sh

          ls .ci-backups/ci-*.dump >/dev/null

      - name: restore script succeeds in dry run mode
        run: |
          backup_file="$(ls .ci-backups/ci-*.dump | head -n 1)"

          DATABASE_URL=postgresql://user:pass@localhost:5432/db \
          DRY_RUN=true \
          bash scripts/db-restore.sh "$backup_file"

  production-config-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartirri
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d smartirri"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartirri
      JWT_ACCESS_SECRET: ci-production-access-secret-must-be-at-least-32
      JWT_REFRESH_SECRET: ci-production-refresh-secret-must-be-32+
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      DEVICE_SHARED_KEY: ci-production-device-key
      CORS_ORIGIN: https://example.com
      TRUST_PROXY: true
      LOG_HTTP_REQUESTS: true
      LOG_STARTUP_BANNER: true
      API_RATE_LIMIT_WINDOW_MS: 900000
      API_RATE_LIMIT_MAX: 1000
      AUTH_LOGIN_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_LOGIN_RATE_LIMIT_MAX: 10
      AUTH_REFRESH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_REFRESH_RATE_LIMIT_MAX: 30
      AUTH_LOGIN_MAX_FAILED_ATTEMPTS: 5
      AUTH_LOGIN_LOCKOUT_SECONDS: 900
      AUTH_LOGIN_BACKOFF_BASE_SECONDS: 2
      AUTH_LOGIN_BACKOFF_MAX_SECONDS: 30
      API_VERSION: v1
      API_DEPRECATION: false
      API_SUNSET: TBD

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Reject wildcard CORS in production
        run: |
          set +e
          NODE_ENV=production \
          CORS_ORIGIN='*' \
          DATABASE_URL='postgresql://postgres:postgres@localhost:5432/smartirri' \
          JWT_ACCESS_SECRET='ci-production-access-secret-must-be-at-least-32' \
          JWT_REFRESH_SECRET='ci-production-refresh-secret-must-be-32+' \
          DEVICE_SHARED_KEY='ci-production-device-key' \
          node -e "require('./src/config/env')"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected env validation to fail with wildcard CORS in production"
            exit 1
          fi

      - name: Reject invalid API_VERSION format
        run: |
          set +e
          NODE_ENV=production \
          CORS_ORIGIN='https://example.com' \
          DATABASE_URL='postgresql://postgres:postgres@localhost:5432/smartirri' \
          JWT_ACCESS_SECRET='ci-production-access-secret-must-be-at-least-32' \
          JWT_REFRESH_SECRET='ci-production-refresh-secret-must-be-32+' \
          DEVICE_SHARED_KEY='ci-production-device-key' \
          API_VERSION='version1' \
          node -e "require('./src/config/env')"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected env validation to fail with invalid API_VERSION format"
            exit 1
          fi

      - name: Reject deprecation without concrete sunset date
        run: |
          set +e
          NODE_ENV=production \
          CORS_ORIGIN='https://example.com' \
          DATABASE_URL='postgresql://postgres:postgres@localhost:5432/smartirri' \
          JWT_ACCESS_SECRET='ci-production-access-secret-must-be-at-least-32' \
          JWT_REFRESH_SECRET='ci-production-refresh-secret-must-be-32+' \
          DEVICE_SHARED_KEY='ci-production-device-key' \
          API_VERSION='v1' \
          API_DEPRECATION='true' \
          API_SUNSET='TBD' \
          node -e "require('./src/config/env')"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected env validation to fail when API_DEPRECATION=true and API_SUNSET=TBD"
            exit 1
          fi

      - name: Reject non-positive API_RATE_LIMIT_MAX
        run: |
          set +e
          NODE_ENV=production \
          CORS_ORIGIN='https://example.com' \
          DATABASE_URL='postgresql://postgres:postgres@localhost:5432/smartirri' \
          JWT_ACCESS_SECRET='ci-production-access-secret-must-be-at-least-32' \
          JWT_REFRESH_SECRET='ci-production-refresh-secret-must-be-32+' \
          DEVICE_SHARED_KEY='ci-production-device-key' \
